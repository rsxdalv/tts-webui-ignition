name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install frontend dependencies
        working-directory: ./vite-src
        run: npm ci

      - name: Build neutralino app
        run: |
          export PATH="$PWD/vite-src/node_modules/.bin:$PATH"
          npx neu build --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: dist-*
          merge-multiple: true

      - name: Prepare binaries
        run: |
          mkdir -p release
          # Linux binaries are in dist-vite-app/ directory
          if [ -d "dist-vite-app" ]; then
            cd dist-vite-app
            # Find all executable files
            for f in $(find . -type f -executable -name "vite-app*"); do
              cp "$f" ../release/
            done
            # Find all .zip files
            for f in $(find . -name "*.zip"); do
              cp "$f" ../release/
            done
            cd ..
          fi
          # macOS and Windows artifacts
          for dir in dist-macos-latest dist-windows-latest; do
            if [ -d "$dir" ]; then
              cd "$dir"
              for f in $(find . -type f -executable -name "vite-app*"); do
                cp "$f" ../release/
              done
              for f in $(find . -name "*.zip"); do
                cp "$f" ../release/
              done
              cd ..
            fi
          done
          ls -la release/

      - name: Package releases
        run: |
          cd release
          # Package Linux
          if [ -f "vite-app" ]; then
            tar -czf ../vite-app-linux.tar.gz vite-app
          fi
          # Package macOS
          if [ -f "vite-app-macos" ]; then
            tar -czf ../vite-app-macos.tar.gz vite-app-macos
          fi
          # Package Windows
          if [ -f "vite-app.exe" ]; then
            7z a ../vite-app-windows.zip vite-app.exe
          fi
          cd ..
          ls -la *.tar.gz *.zip 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            vite-app-linux.tar.gz
            vite-app-macos.tar.gz
            vite-app-windows.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
