name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: |
          cd vite-src
          npm ci
          npm run build

      - name: Update Neutralino.js
        run: npx neu update

      - name: Build neutralino app
        run: npx neu build --release --embed-resources

      - name: Debug listing
        run: |
          echo "=== Listing all files ===" 
          find . -type f \( -name "*.neu" -o -name "vite-app*" \) 2>/dev/null
          ls -R dist/

      - name: Upload artifacts for debugging
        uses: actions/upload-artifact@v4
        with:
          name: dist-files
          path: |
            dist/
            vite-src/dist/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.sha }}
          name: Release ${{ github.sha }}
          files: |
            dist/vite-app/resources.neu
            dist/vite-app/vite-app-linux_x64
            dist/vite-app/vite-app-linux_arm64
            dist/vite-app/vite-app-linux_armhf
            dist/vite-app/vite-app-mac_x64
            dist/vite-app/vite-app-mac_arm64
            dist/vite-app/vite-app-mac_universal
            dist/vite-app/vite-app-win_x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

