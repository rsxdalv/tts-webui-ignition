name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build neutralino app
        run: npx neu build --release

      - name: Prepare release files
        run: |
          mkdir -p release
          cp dist/vite-app/vite-app-linux_x64 release/
          cp dist/vite-app/vite-app-linux_arm64 release/
          cp dist/vite-app/vite-app-linux_armhf release/
          cp dist/vite-app/vite-app-mac_x64 release/
          cp dist/vite-app/vite-app-mac_arm64 release/
          cp dist/vite-app/vite-app-mac_universal release/
          cp dist/vite-app/vite-app-win_x64.exe release/vite-app.exe
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/vite-app-linux_x64
            release/vite-app-linux_arm64
            release/vite-app-linux_armhf
            release/vite-app-mac_x64
            release/vite-app-mac_arm64
            release/vite-app-mac_universal
            release/vite-app.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
