name: Build and Release

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: |
          cd vite-src
          npm ci
          npm run build

      - name: Build neutralino app
        run: npx neu build --release

      - name: Debug find all files
        run: |
          echo "=== dist folder ===" && ls -la dist/ 2>/dev/null || echo "no dist folder"
          echo "=== dist/vite-app folder ===" && ls -la dist/vite-app/ 2>/dev/null || echo "no dist/vite-app folder"
          echo "=== vite-src/dist folder ===" && ls -la vite-src/dist/ 2>/dev/null || echo "no vite-src/dist folder"
          echo "=== find all vite-app files ===" && find . -name "vite-app*" 2>/dev/null | head -20

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: release-${{ github.sha }}
          name: Release ${{ github.sha }}
          files: |
            dist/vite-app/resources.neu
            dist/vite-app/vite-app-linux_x64
            dist/vite-app/vite-app-linux_arm64
            dist/vite-app/vite-app-linux_armhf
            dist/vite-app/vite-app-mac_x64
            dist/vite-app/vite-app-mac_arm64
            dist/vite-app/vite-app-mac_universal
            dist/vite-app/vite-app-win_x64.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
